<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOBI — Super Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/public/192.png" type="image/png">
</head>
<body class="dark-theme">
    <div id="app">
        <input type="file" id="photoInput" accept="image/*">
        
        <div class="screen active" id="profile-screen">
            <div class="profile-photo-section">
                <div class="profile-photo" id="profilePhoto">
                    <span id="photoPlaceholder">👤</span>
                </div>
                <div class="edit-photo" id="changePhotoBtn">Изменить фото</div>
                <div class="profile-name" id="profileNameDisplay">Иван Петров</div>
            </div>
            <div class="info-block">
                <div class="info-item">
                    <div class="info-label">ИМЯ</div>
                    <div class="info-value" id="nameDisplay">Иван Петров</div>
                    <input type="text" id="nameInput" class="info-input" style="display:none;">
                </div>
                <div class="info-item">
                    <div class="info-label">О СЕБЕ</div>
                    <div class="info-value" id="aboutDisplay">Разработчик</div>
                    <input type="text" id="aboutInput" class="info-input" style="display:none;">
                </div>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">🌙 Тёмная тема</button>
            <button class="action-button" id="editProfileBtn">Редактировать профиль</button>
            <button class="action-button" id="saveProfileBtn" style="display:none; background: #28a745;">Сохранить изменения</button>
        </div>

        <div class="screen" id="notes-screen">
            <div class="notes-header">
                <h2>Заметки</h2>
                <button class="add-note-btn" id="showAddNoteBtn">+</button>
            </div>
            <div id="notesContainer"></div>
            <div class="add-note-form" id="addNoteForm">
                <input type="text" id="noteTitle" placeholder="Заголовок">
                <textarea id="noteText" placeholder="Текст заметки..."></textarea>
                <button class="save-note-btn" id="saveNoteBtn">Добавить заметку</button>
            </div>
        </div>

        <div class="screen" id="habits-screen">
            <div class="habits-date" id="habitDateHeader">Сегодня</div>
            <div class="habits-sub">Ваш прогресс на текущий день</div>
            <div id="habitsContainer"></div>
            <button class="save-progress-btn" id="saveProgressBtn">Завершить день и сохранить ✨</button>
        </div>

        <div class="screen" id="stats-screen">
            <div class="section-title">Календарь недели</div>
            <div class="calendar-week" id="calendarWeek">
                <span class="cal-day" data-index="0">Пн</span>
                <span class="cal-day" data-index="1">Вт</span>
                <span class="cal-day" data-index="2">Ср</span>
                <span class="cal-day" data-index="3">Чт</span>
                <span class="cal-day" data-index="4">Пт</span>
                <span class="cal-day" data-index="5">Сб</span>
                <span class="cal-day" data-index="6">Вс</span>
            </div>
            
            <div class="section-title" id="selectedDayTitle">Активность</div>
            <div class="stats-grid" id="statsGrid">
                </div>

            <div class="section-title">Заметки за этот день</div>
            <div id="statsNotesContainer"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-screen="profile"><span>👤</span>Профиль</div>
            <div class="nav-item" data-screen="notes"><span>📝</span>Заметки</div>
            <div class="nav-item" data-screen="habits"><span>✅</span>Привычки</div>
            <div class="nav-item" data-screen="stats"><span>📊</span>Статистика</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
