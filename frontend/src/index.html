<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOBI — Трекер привычек</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <input type="file" id="photoInput" accept="image/*">
        
        <!-- ПРОФИЛЬ -->
        <div class="screen active" id="profile-screen">
            <div class="profile-photo-section">
                <div class="profile-photo" id="profilePhoto">
                    <span id="photoPlaceholder">👤</span>
                </div>
                <div class="edit-photo" id="changePhotoBtn">Изменить фото</div>
                <div class="profile-name" id="profileNameDisplay">Иван Петров</div>
            </div>
            <div class="info-block">
                <div class="info-item">
                    <div class="info-label">ИМЯ</div>
                    <div class="info-value" id="nameDisplay"></div>
                    <input type="text" id="nameInput" class="info-input" style="display:none;">
                </div>
                <div class="info-item">
                    <div class="info-label">О СЕБЕ</div>
                    <div class="info-value" id="aboutDisplay"></div>
                    <input type="text" id="aboutInput" class="info-input" style="display:none;">
                </div>
                <div class="info-item">
                    <div class="info-label">ДЕНЬ РОЖДЕНИЯ</div>
                    <div class="info-value" id="birthDisplay"></div>
                    <input type="text" id="birthInput" class="info-input" style="display:none;">
                </div>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">☀️ Светлая тема</button>
            <button class="action-button" id="editProfileBtn">Редактировать</button>
            <button class="action-button" id="saveProfileBtn" style="display:none; background: linear-gradient(145deg, #28a745, #1e7b34);">Сохранить</button>
        </div>

        <!-- ЗАМЕТКИ -->
        <div class="screen" id="notes-screen">
            <div class="notes-header">
                <h2>Все Заметки</h2>
                <button class="add-note-btn" id="showAddNoteBtn">+</button>
            </div>
            
            <div class="add-note-form" id="addNoteForm">
                <input type="text" id="noteTitle" placeholder="Заголовок">
                <textarea id="noteText" placeholder="Текст заметки..."></textarea>
                <button class="save-note-btn action-button" id="saveNoteBtn">Добавить заметку</button>
                <button class="cancel-btn" id="cancelNoteBtn">Отмена</button>
            </div>

            <div id="notesContainer"></div>
        </div>

        <!-- ПРИВЫЧКИ (СЕГОДНЯ) -->
        <div class="screen" id="habits-screen">
            <div class="habits-date">Сегодня</div>
            <div class="habits-sub" id="todayDateDisplay">--</div>

            <div id="habitsContainer"></div>

            <div class="add-habit-card" id="showAddHabitBtn">
                <span>+</span> Новая цель
            </div>

            <div class="add-habit-form" id="addHabitForm">
                <input type="text" id="habitName" placeholder="Название (например: Медитация)">
                <input type="text" id="habitEmoji" placeholder="Эмодзи (например: 🧘‍♂️)">
                <input type="text" id="habitUnit" placeholder="Единица (л, мин, шт)" value="мин">
                <input type="number" id="habitGoal" placeholder="Цель за день (число)" value="15">
                <button class="save-note-btn action-button" id="saveHabitBtn">Добавить</button>
                <button class="cancel-btn" id="cancelHabitBtn">Отмена</button>
            </div>
        </div>

        <!-- СТАТИСТИКА И ПРОГРЕСС -->
        <div class="screen" id="stats-screen">
            <div class="section-title">Календарь (последние 7 дней)</div>
            <div class="calendar-week" id="calendarWeek">
                <!-- Дни генерируются через JS -->
            </div>

            <div class="section-title" id="selectedDayTitle">Прогресс за день</div>
            
            <div class="stats-grid" id="statsGrid">
                <!-- Карточки генерируются динамически -->
            </div>

            <div class="section-title">Выполнение целей</div>
            <div id="progressContainer">
                <!-- Прогресс-бары генерируются динамически -->
            </div>

            <div class="section-title" style="margin-top: 20px;">Заметки за этот день</div>
            <div id="statsNotesContainer"></div>
            
            <div class="stats-add-note">
                <input type="text" id="statsNoteInput" placeholder="Быстрая заметка...">
                <button id="addStatsNoteBtn">+</button>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <!-- НАВИГАЦИЯ -->
        <div class="bottom-nav">
            <div class="nav-item active" data-screen="profile"><span>😎</span>Профиль</div>
            <div class="nav-item" data-screen="notes"><span>📒</span>Заметки</div>
            <div class="nav-item" data-screen="habits"><span>🔥</span>Цели</div>
            <div class="nav-item" data-screen="stats"><span>📈</span>Прогресс</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
